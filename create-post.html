<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post • GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; }
        .container { max-width:400px; margin:auto; padding:20px; }
        .header { text-align:center; font-weight:bold; font-size:18px; margin-bottom:20px; }
        .preview { width:100%; aspect-ratio:1/1; object-fit:cover; background:#121212; border-radius:12px; margin-bottom:15px; display:none; }
        input[type="file"] { width:100%; padding:10px; background:#121212; border-radius:8px; border:1px solid #333; }
        textarea { width:100%; height:100px; background:#121212; color:#fff; border:1px solid #333; border-radius:10px; padding:12px; box-sizing:border-box; margin-top:10px; }
        .btn { width:100%; padding:14px; margin-top:20px; background:#0095f6; color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; }
        .btn:disabled { opacity:0.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">New Post</div>
    <img id="preview" class="preview">
    <input type="file" id="postImage" accept="image/*">
    <textarea id="caption" placeholder="Write a caption..."></textarea>
    <button id="postBtn" class="btn">Share Post</button>
</div>
  
<script type="module">
    import { db, collection, addDoc, serverTimestamp } from "./firebase-config.js";

    const CLOUD_NAME = "dxcdq1jxz";
    const UPLOAD_PRESET = "godlinsta"; // Ensure this matches your Cloudinary preset

    let selectedFile = null;
    const postImage = document.getElementById("postImage");
    const preview = document.getElementById("preview");
    const postBtn = document.getElementById("postBtn");

    postImage.addEventListener("change", function(){
        selectedFile = this.files[0];
        if(!selectedFile) return;
        preview.src = URL.createObjectURL(selectedFile);
        preview.style.display = "block";
    });

    postBtn.addEventListener("click", async () => {
        if(!selectedFile) return alert("Please select an image!");
        
        postBtn.disabled = true;
        postBtn.innerText = "Uploading...";

        try {
            const formData = new FormData();
            formData.append("file", selectedFile);
            formData.append("upload_preset", UPLOAD_PRESET);

            const upload = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: "POST",
                body: formData
            });

            const cloudData = await upload.json();

            await addDoc(collection(db, "posts"), {
                image: cloudData.secure_url,
                caption: document.getElementById("caption").value,
                username: localStorage.getItem("currentUsername") || "Anonymous",
                likes: 0,
                createdAt: serverTimestamp()
            });

            alert("Post Uploaded!");
            location.href = "home.html";
        } catch(error) {
            console.error(error);
            alert("Upload Failed! Check your Cloudinary preset.");
            postBtn.disabled = false;
            postBtn.innerText = "Share Post";
        }
    });
</script>
</body>
</html>
