<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .box { display: flex; flex-direction: column; gap: 20px; max-width: 400px; margin: auto; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 12px; color: #aaa; }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; padding: 12px; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0095f6; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .cancel-btn { background: #333; }
    </style>
</head>
<body>

    <div class="header">
        <span onclick="history.back()">Cancel</span>
        <strong>Edit Profile</strong>
        <span id="saveBtn" style="color: #0095f6; font-weight: bold; cursor: pointer;">Done</span>
    </div>

    <div class="box">
        <div class="input-group">
            <label>Name</label>
            <input type="text" id="editName" placeholder="Full Name">
        </div>
        <div class="input-group">
            <label>Bio</label>
            <textarea id="editBio" rows="3" placeholder="Bio"></textarea>
        </div>
        <button id="saveBtnBottom">Save Changes</button>
        <button onclick="history.back()" class="cancel-btn">Cancel</button>
    </div>

    <script type="module">
        import "./auth-guard.js";
        import { auth, db } from "./firebase-config.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const saveBtn = document.getElementById("saveBtn");
        const saveBtnBottom = document.getElementById("saveBtnBottom");

        const updateProfile = async (btn) => {
            const name = document.getElementById("editName").value;
            const bio = document.getElementById("editBio").value;
            const user = auth.currentUser;

            if(!user) return alert("Please log in!");

            try {
                btn.innerText = "Saving...";
                btn.disabled = true;

                // Directly use user.uid (No need to query by email, it's inefficient)
                const userDocRef = doc(db, "users", user.uid);
                await updateDoc(userDocRef, {
                    full_name: name,
                    bio: bio
                });

                alert("Profile Updated!");
                window.location.replace("profile.html");
            } catch (error) {
                console.error(error);
                alert("Update Failed!");
                btn.innerText = "Save Changes";
                btn.disabled = false;
            }
        };

        saveBtn.addEventListener("click", () => updateProfile(saveBtn));
        saveBtnBottom.addEventListener("click", () => updateProfile(saveBtnBottom));
    </script>
</body>
</html>
