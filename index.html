<!DOCTYPE html>
<html>
<head>
<title>GODLINSTA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fafafa;
    text-align:center;
}

.container{
    max-width:350px;
    margin:auto;
    padding-top:60px;
}

.logo{
    width:120px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
    font-size:16px;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#1877f2;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

.link{
    color:#1877f2;
    cursor:pointer;
    margin-top:15px;
    display:block;
    text-decoration:none;
}

.create{
    background:white;
    color:#1877f2;
    border:2px solid #1877f2;
}

h1{
    margin:10px 0;
}

p{
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<img src="GODL LOGO.png" class="logo">

<h1>GODLINSTA</h1>

<p>India's Future Social Media App</p>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="btn">Log In</button>

<a href="#" class="link">Forgot Password?</a>

<button class="btn create">Create New Account</button>

</div>

</body>
</html>
