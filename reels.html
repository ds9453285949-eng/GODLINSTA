<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; }
        /* App Title Header */
        #header { position:fixed; top:0; width:100%; text-align:center; padding:10px; font-weight:bold; z-index:100; background:rgba(0,0,0,0.5); }
        /* Feed */
        #reelsContainer { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; }
        .reel-card { height:100vh; scroll-snap-align:start; position:relative; }
        video { width:100%; height:100%; object-fit:cover; }
        /* Bottom Navbar */
        #navbar { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#000; padding:15px 0; border-top:1px solid #333; z-index:100; }
        .nav-icon { font-size:24px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="header">GODLINSTA</div>
    <div id="reelsContainer"></div>

    <div id="navbar">
        <div class="nav-icon" onclick="location.href='reels.html'">🏠</div>
        <div class="nav-icon">🔍</div>
        <div class="nav-icon" onclick="location.href='reels-upload.html'">➕</div>
        <div class="nav-icon">🎥</div>
        <div class="nav-icon">👤</div>
    </div>

    <script type="module">
        import { db, collection, query, orderBy, onSnapshot } from "./firebase-config.js";
        const c = document.getElementById("reelsContainer");
        onSnapshot(query(collection(db, "reels"), orderBy("createdat", "desc")), (snap) => {
            c.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                c.innerHTML += `<div class="reel-card"><video src="${d.videourl}" loop autoplay playsinline muted></video></div>`;
            });
        });
    </script>
</body>
</html>
