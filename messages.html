<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .chat-area { height: 80vh; overflow-y: scroll; padding: 20px; }
        .input-area { position: fixed; bottom: 0; width: 100%; display: flex; padding: 10px; background: #111; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; }
        button { padding: 10px 20px; border-radius: 20px; background: #0095f6; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-area" id="chatList"></div>
    
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Message...">
        <button id="sendBtn">Send</button>
    </div>

    <script type="module">
        import { db, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "./firebase-config.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const auth = getAuth();
        const sendBtn = document.getElementById("sendBtn");

        // 7-Step Logic for Sending Message
        sendBtn.addEventListener("click", async () => {
            const msg = document.getElementById("msgInput").value;
            if(!msg) return;

            try {
                // 1. Loading State
                sendBtn.innerText = "Sending...";
                sendBtn.disabled = true;

                // 2. Database Update
                await addDoc(collection(db, "messages"), {
                    messageText: msg,
                    senderId: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });

                // 3. Success Feedback
                document.getElementById("msgInput").value = "";
                sendBtn.innerText = "Send";
                sendBtn.disabled = false;

            } catch (error) {
                // 4. Error Handling
                console.error(error);
                alert("Failed to send message!");
                sendBtn.innerText = "Send";
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
