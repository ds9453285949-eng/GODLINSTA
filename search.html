<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .search-bar { padding: 15px; border-bottom: 1px solid #333; }
        input { width: 90%; padding: 10px; background: #222; border: none; border-radius: 8px; color: #fff; }
        .results { padding: 10px; }
        .user-item { display: flex; align-items: center; padding: 10px; gap: 15px; }
    </style>
</head>
<body>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search users...">
    </div>
    <div id="results" class="results"></div>

    <script type="module">
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const db = getFirestore();

        document.getElementById("searchInput").addEventListener("input", async (e) => {
            const val = e.target.value;
            if(val.length > 2) {
                const q = query(collection(db, "users"), where("username", ">=", val));
                const snap = await getDocs(q);
                const resDiv = document.getElementById("results");
                resDiv.innerHTML = "";
                snap.forEach(doc => {
                    resDiv.innerHTML += `<div class="user-item"><h3>${doc.data().username}</h3></div>`;
                });
            }
        });
    </script>
</body>
</html>
