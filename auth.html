<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GODLINSTA</title>
    <style>
        body { background: #fafafa; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #fff; border: 1px solid #dbdbdb; padding: 40px; width: 300px; text-align: center; }
        .logo { font-size: 30px; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; background: #fafafa; }
        .btn { width: 100%; padding: 8px; background: #0095f6; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: 600; margin-top: 10px; }
        .hidden { display: none; }
        .step { display: none; }
        .active { display: block; }
        .switch-box { background: #fff; border: 1px solid #dbdbdb; padding: 20px; width: 300px; margin-top: 10px; font-size: 14px; }
        span { color: #0095f6; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div>
    <div class="card" id="loginView">
        <div class="logo">GODLINSTA</div>
        <input type="email" id="l-email" placeholder="Email">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn" id="loginBtn">Log In</button>
    </div>

    <div class="card hidden" id="signupView">
        <div class="logo">GODLINSTA</div>
        
        <div id="step1" class="step active">
            <input type="email" id="s-email" placeholder="Email Address">
            <button class="btn" onclick="next(2)">Next</button>
        </div>

        <div id="step2" class="step">
            <input type="password" id="s-pass" placeholder="Create Password">
            <button class="btn" onclick="next(3)">Next</button>
        </div>

        <div id="step3" class="step">
            <input type="text" id="s-name" placeholder="Full Name">
            <button class="btn" onclick="next(4)">Next</button>
        </div>

        <div id="step4" class="step">
            <input type="text" id="s-user" placeholder="Username">
            <button class="btn" id="finishSignup">Sign Up</button>
        </div>
    </div>

    <div class="switch-box">
        <p id="toggleText">Don't have an account? <span onclick="toggleMode()">Sign up</span></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDJSmirvoIwieTr25NQUOtAHF-v_aTINoM", authDomain: "godlinsta.firebaseapp.com", projectId: "godlinsta", storageBucket: "godlinsta.firebasestorage.app", messagingSenderId: "808932933868", appId: "1:808932933868:web:098b5e9cb0fd4e856065c9" };
    const auth = getAuth(initializeApp(firebaseConfig));
    const db = getFirestore(initializeApp(firebaseConfig));

    window.toggleMode = () => {
        document.getElementById('loginView').classList.toggle('hidden');
        document.getElementById('signupView').classList.toggle('hidden');
        document.getElementById('toggleText').innerHTML = document.getElementById('loginView').classList.contains('hidden') ? 
            'Have an account? <span onclick="toggleMode()">Log in</span>' : 
            'Don\'t have an account? <span onclick="toggleMode()">Sign up</span>';
    };

    window.next = (n) => {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
    };

    document.getElementById("loginBtn").addEventListener("click", () => {
        signInWithEmailAndPassword(auth, document.getElementById("l-email").value, document.getElementById("l-pass").value)
        .then(() => window.location.replace("profile.html"))
        .catch(e => alert(e.message));
    });

    document.getElementById("finishSignup").addEventListener("click", async () => {
        try {
            const res = await createUserWithEmailAndPassword(auth, document.getElementById('s-email').value, document.getElementById('s-pass').value);
            await setDoc(doc(db, "users", res.user.uid), { full_name: document.getElementById('s-name').value, username: document.getElementById('s-user').value });
            window.location.replace("profile.html");
        } catch(e) { alert(e.message); }
    });
</script>
</body>
</html>
