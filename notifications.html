<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; }
        .notif { padding: 15px; border-bottom: 1px solid #262626; display: flex; align-items: center; gap: 10px; }
        .notif-img { width: 40px; height: 40px; border-radius: 50%; background: #333; }
    </style>
</head>
<body>
    <h3>Notifications</h3>
    <div id="notifList"></div>

    <script type="module">
        import { db, auth } from "./firebase-config.js";
        import { collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        auth.onAuthStateChanged((user) => {
            if (!user) return;
            
            // Sirf current user ki notifications fetch karo
            const q = query(collection(db, "notifications"), where("toUserId", "==", user.uid), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snap) => {
                const list = document.getElementById("notifList");
                list.innerHTML = "";
                snap.forEach(doc => {
                    const n = doc.data();
                    list.innerHTML += `
                        <div class="notif">
                            <div class="notif-img"></div>
                            <div><b>${n.fromUsername}</b> ${n.type === 'like' ? 'liked your post' : 'commented on your post'}</div>
                        </div>
                    `;
                });
            });
        });
    </script>
</body>
</html>
