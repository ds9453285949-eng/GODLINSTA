<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA Sign Up</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:320px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:15px;
margin:8px 0;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:14px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}

.create{
background:black;
color:#1877f2;
border:2px solid #1877f2;
}

.tagline{
color:#4f5dff;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<img src="GODL LOGO.png" width="90">

<h1>𝐂𝐑𝐄𝐀𝐓𝐄 𝐀𝐂𝐂𝐎𝐔𝐍𝐓</h1>

<p class="tagline">
Join GODLINSTA Today
</p>

<input type="text" id="fullname" placeholder="Full Name">

<input type="text" id="username" placeholder="Username">
  
<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">
  
<button class="btn" id="signupBtn">
Sign Up
</button>
  
<br><br>

<a href="login.html">
<button class="btn create">
Back To Login
</button>
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDJSmirvoIwieTr25NQUOtAHF-v_aTINoM",
authDomain: "godlinsta.firebaseapp.com",
projectId: "godlinsta",
storageBucket: "godlinsta.firebasestorage.app",
messagingSenderId: "808932933868",
appId: "1:808932933868:web:098b5e9cb0fd4e856065c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("signupBtn").addEventListener("click", async () => {

const fullname = document.getElementById("fullname").value.trim();

const username = document.getElementById("username").value
.toLowerCase()
.trim();

const email = document.getElementById("email").value.trim();

const password = document.getElementById("password").value;

if(fullname === "" || username === "" || email === "" || password === ""){
alert("Fill all fields");
return;
}

if(username.includes(" ")){
alert("Username cannot contain spaces");
return;
}

const q = query(
collection(db,"users"),
where("username","==",username)
);

const snap = await getDocs(q);

if(!snap.empty){
alert("Username already taken");
return;
}

try {

await createUserWithEmailAndPassword(
auth,
email,
password
);

await addDoc(
collection(db,"users"),
{
fullname: fullname,
username: username,
email: email,
followers: 0,
following: 0,
posts: 0
}
);

alert("Account Created Successfully");

window.location.href = "login.html";

} catch(error) {

alert(error.message);

}

});
  
</script>

</body>
</html>
