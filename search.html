<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search • GODLINSTA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topbar">
        <input type="text" id="searchInput" placeholder="Search users..." style="width:90%; padding:10px; border-radius:20px; border:none; background:#262626; color:#fff;">
    </div>
    <div id="results" style="padding:15px;"></div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const input = document.getElementById("searchInput");
        input.addEventListener("input", async (e) => {
            const val = e.target.value.toLowerCase();
            if(val === "") { document.getElementById("results").innerHTML = ""; return; }

            // Firestore Query
            const q = query(collection(db, "users"), where("username", ">=", val), where("username", "<=", val + '\uf8ff'));
            const snap = await getDocs(q);
            
            document.getElementById("results").innerHTML = "";
            snap.forEach(doc => {
                const user = doc.data();
                document.getElementById("results").innerHTML += `
                    <div onclick="location.href='profile.html?uid=${user.uid}'" style="display:flex; align-items:center; gap:10px; padding:10px;">
                        <img src="${user.profilePic || 'https://ui-avatars.com/api/?name='+user.username}" style="width:40px; height:40px; border-radius:50%;">
                        <b>${user.username}</b>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
