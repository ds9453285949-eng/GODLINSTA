<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: auto; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; }
        button { padding: 12px; background: #0095f6; border: none; border-radius: 8px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Edit Profile</h3>
        <input type="text" id="editName" placeholder="Full Name">
        <input type="text" id="editBio" placeholder="Bio">
        <button id="saveBtn">Save Changes</button>
        <button onclick="history.back()" style="background:#333;">Cancel</button>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const auth = getAuth();
        const saveBtn = document.getElementById("saveBtn");

        saveBtn.addEventListener("click", async () => {
            const name = document.getElementById("editName").value;
            const bio = document.getElementById("editBio").value;
            const user = auth.currentUser;

            try {
                // 1. Loading State
                saveBtn.innerText = "Saving...";
                saveBtn.disabled = true;

                // 2. Database Update (Find user by email and update)
                const q = query(collection(db, "users"), where("email", "==", user.email));
                const snap = await getDocs(q);
                
                if(!snap.empty) {
                    const userDocRef = doc(db, "users", snap.docs[0].id);
                    await updateDoc(userDocRef, {
                        full_name: name,
                        bio: bio
                    });
                }

                // 3. Success Feedback
                alert("Profile Updated!");
                window.location.href = "profile.html";

            } catch (error) {
                // 4. Error Handling
                console.error(error);
                alert("Update Failed!");
                saveBtn.innerText = "Save Changes";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
