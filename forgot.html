<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:320px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:15px;
margin:8px 0;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:14px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="GODL LOGO.png" width="90">

<h1>Forgot Password</h1>

<input type="email" id="email" placeholder="Enter Your Email">

<button class="btn" id="resetBtn">
Send Reset Link
</button>

</div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJSmirvoIwieTr25NQUOtAHF-v_aTINoM",
  authDomain: "godlinsta.firebaseapp.com",
  projectId: "godlinsta",
  storageBucket: "godlinsta.firebasestorage.app",
  messagingSenderId: "808932933868",
  appId: "1:808932933868:web:098b5e9cb0fd4e856065c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("resetBtn").addEventListener("click", function(){

  const email = document.getElementById("email").value;

  if(!email){
    alert("Email dalo");
    return;
  }

  sendPasswordResetEmail(auth, email)

  .then(function(){
    alert("Password reset email bhej diya gaya hai");
  })

  .catch(function(error){
    alert(error.message);
  });

});

</script>

</body>
</html>
