<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; padding-bottom:70px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #1a1a1a; position:sticky; top:0; background:#000; z-index:1000; }
        #stories { display:flex; overflow-x:auto; padding:10px; gap:12px; border-bottom:1px solid #1a1a1a; scrollbar-width: none; }
        .story-ring { width:68px; height:68px; border-radius:50%; padding:2px; background:linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); flex-shrink:0; }
        .story-img { width:100%; height:100%; border-radius:50%; object-fit:cover; border:2px solid #000; }
        .post { width:100%; max-width:400px; margin:0 auto 20px auto; border-bottom:1px solid #1a1a1a; }
        .post-img { width:100%; aspect-ratio:1/1; object-fit:cover; background:#111; }
        .actions { display:flex; justify-content:space-between; padding:12px; font-size:26px; }
        .bottom-nav { position:fixed; bottom:0; width:100%; background:#000; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #1a1a1a; z-index:1000; }
        .nav-icon { font-size:24px; cursor:pointer; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="font-size:24px; font-weight:bold;">GODLINSTA</div>
    <div class="nav-icon" onclick="location.href='notifications.html'">❤️</div>
</div>

<div id="stories">
    <div class="story-ring"><img src="https://ui-avatars.com/api/?name=You" class="story-img"></div>
    <div class="story-ring"><img src="https://ui-avatars.com/api/?name=User" class="story-img"></div>
</div>

<div class="feed" id="feed"></div>

<nav class="bottom-nav">
    <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
    <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
    <div class="nav-icon" onclick="location.href='create.html'">➕</div>
    <div class="nav-icon" onclick="location.href='reels.html'">🎬</div>
    <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
</nav>

<script type="module">
    import { db, collection, query, orderBy, onSnapshot } from "./firebase-config.js";

    // Global Functions for UI interaction
    window.toggleLike = (el) => { el.style.color = (el.style.color === 'red') ? '#fff' : 'red'; };
    window.toggleSave = (el) => { el.innerText = (el.innerText === '🔖') ? '📌' : '🔖'; };

    const feed = document.getElementById("feed");
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
        feed.innerHTML = "";
        snap.forEach((doc) => {
            const p = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <div style="padding:10px; font-weight:bold;">${p.username || "User"}</div>
                    <img src="${p.image}" class="post-img" onerror="this.src='https://via.placeholder.com/400'">
                    <div class="actions">
                        <div>
                            <span onclick="toggleLike(this)" style="cursor:pointer; margin-right:12px;">❤️</span>
                            <span>💬</span> <span>✈️</span>
                        </div>
                        <span onclick="toggleSave(this)" style="cursor:pointer;">🔖</span>
                    </div>
                    <div style="padding:0 10px 15px;"><b>${p.username || ""}</b> ${p.caption || ""}</div>
                </div>`;
        });
    });
</script>
</body>
</html>
