<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA Profile</title>
  
  <link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="topbar">
<div>➕</div>
<div id="username">username</div>
<div>☰</div>
</div>

<div class="profile-header">

<img id="profileImage" src="GODL LOGO.png" class="profile-pic">

<div class="stats">

<div>
<h3 id="postsCount">0</h3>
<p>Posts</p>
</div>

<div>
<h3>0</h3>
<p>Followers</p>
</div>

<div>
<h3>0</h3>
<p>Following</p>
</div>

</div>

</div>

<div class="profile-info">

<h3 id="name">Your Name</h3>

<div id="bio">No bio yet</div>

<a id="website" style="color:#4f5dff"></a>

</div>

<div class="profile-buttons">

<button onclick="location.href='edit-profile.html'">
Edit Profile
</button>

<button>
Share Profile
</button>

</div>

<div class="highlights">

<div class="highlight">
<div class="highlight-circle">+</div>
<div>New</div>
</div>

</div>

<div class="tabs">

<div>▦</div>

<div>🎞</div>

<div>👤</div>

</div>

<div id="postsGrid" class="posts-grid"></div>

<div class="bottom-nav">

<div>🏠</div>

<div onclick="location.href='create-post.html'">🎬</div>

<div>➕</div>

<div>🔍</div>

<div>👤</div>

</div>

<script>

document.getElementById("profileImage").src =
localStorage.getItem("profilePic") || "GODL LOGO.png";

document.getElementById("username").innerText =
localStorage.getItem("username") || "username";

document.getElementById("name").innerText =
localStorage.getItem("name") || "Your Name";

document.getElementById("bio").innerText =
localStorage.getItem("bio") || "No bio yet";

document.getElementById("website").innerText =
localStorage.getItem("website") || "";

const posts = JSON.parse(localStorage.getItem("posts")) || [];

document.getElementById("postsCount").innerText = posts.length;

const postsGrid = document.getElementById("postsGrid");

posts.forEach(post=>{

const img=document.createElement("img");

img.src=post.image;

postsGrid.appendChild(img);

});

</script>

</body>

</body>
</html>
