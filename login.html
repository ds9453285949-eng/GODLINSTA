<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        .logo { font-size: 32px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #121212; color: #fff; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .divider { margin: 20px 0; color: #888; font-size: 13px; font-weight: bold; }
        .create { background: transparent; border: 1px solid #333; margin-top: 20px; }
        a { color: #fff; font-size: 12px; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">GODLINSTA</div>
    <input type="text" id="loginInput" placeholder="Username, email, or phone">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" id="loginBtn">Log In</button>
    
    <div class="divider">OR</div>
    <a href="forgot.html">Forgot password?</a>
    <a href="signup.html"><button class="btn create">Create new account</button></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, or } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDJSmirvoIwieTr25NQUOtAHF-v_aTINoM", authDomain: "godlinsta.firebaseapp.com", projectId: "godlinsta", storageBucket: "godlinsta.firebasestorage.app", messagingSenderId: "808932933868", appId: "1:808932933868:web:098b5e9cb0fd4e856065c9" };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("loginBtn").addEventListener("click", async () => {
        const input = document.getElementById("loginInput").value.trim();
        const pass = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        if(!input || !pass) { alert("Please enter both username and password!"); return; }
        
        btn.disabled = true; 
        btn.innerText = "Logging in...";

        try {
            // Find email by username or phone
            const q = query(collection(db, "users"), or(where("username", "==", input), where("email", "==", input), where("phone", "==", input)));
            const snap = await getDocs(q);
            
            if(snap.empty) throw new Error("User not found!");
            
            const userEmail = snap.docs[0].data().email;
            await signInWithEmailAndPassword(auth, userEmail, pass);
            window.location.replace("home.html"); // Direct to Home
        } catch(e) { 
            alert("Login Failed: " + e.message); 
            btn.disabled = false; 
            btn.innerText = "Log In"; 
        }
    });
</script>
</body>
</html>
