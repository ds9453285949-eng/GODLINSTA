<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; padding-bottom:70px; }
        .search-bar { padding:10px; position:sticky; top:0; background:#000; z-index:100; }
        input { width:100%; padding:10px; background:#1a1a1a; border:none; border-radius:8px; color:#fff; box-sizing:border-box; }
        .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:2px; margin-top:5px; }
        .grid-item { aspect-ratio:1/1; background:#111; }
        .bottom-nav { position:fixed; bottom:0; width:100%; background:#000; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #1a1a1a; }
        .nav-icon { font-size:24px; cursor:pointer; }
    </style>
</head>
<body>

<div class="search-bar">
    <input type="text" placeholder="🔍 Search...">
</div>

<div class="grid" id="exploreGrid">
    </div>

<nav class="bottom-nav">
    <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
    <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
    <div class="nav-icon" onclick="location.href='create.html'">➕</div>
    <div class="nav-icon" onclick="location.href='reels.html'">🎬</div>
    <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
</nav>

<script type="module">
    import { db, collection, query, orderBy, onSnapshot } from "./firebase-config.js";
    
    const grid = document.getElementById("exploreGrid");
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
        grid.innerHTML = "";
        snap.forEach((doc) => {
            const p = doc.data();
            grid.innerHTML += `<img src="${p.image}" class="grid-item" style="width:100%; height:100%; object-fit:cover;">`;
        });
    });
</script>
</body>
</html>
