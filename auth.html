<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODLINSTA</title>
    <style>
        body { background-color: #fafafa; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #fff; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; }
        .logo { font-size: 35px; margin-bottom: 25px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; }
        .btn { width: 100%; padding: 8px; background: #0095f6; border: none; border-radius: 4px; color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        .switch-box { background: #fff; border: 1px solid #dbdbdb; padding: 20px; width: 350px; text-align: center; margin-top: 10px; }
        a { color: #00376b; font-size: 13px; text-decoration: none; display: block; margin-top: 15px; }
        span { color: #0095f6; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div>
    <!-- Login Card -->
    <div class="auth-card" id="loginView">
        <div class="logo">GODLINSTA</div>
        <input type="text" id="l-email" placeholder="Username, email, or phone">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn" id="loginBtn">Log In</button>
        <a href="#">Forgot password?</a>
    </div>

    <!-- Sign Up Card -->
    <div class="auth-card hidden" id="signupView">
        <div class="logo">GODLINSTA</div>
        <input type="text" id="s-email" placeholder="Mobile Number or Email">
        <input type="text" id="s-name" placeholder="Full Name">
        <input type="text" id="s-user" placeholder="Username">
        <input type="password" id="s-pass" placeholder="Password">
        <button class="btn" id="signupBtn">Sign Up</button>
    </div>

    <!-- Toggle Box -->
    <div class="switch-box">
        <p id="toggleText">Don't have an account? <span onclick="toggleView()">Sign up</span></p>
    </div>
</div>

<script>
    function toggleView() {
        const login = document.getElementById('loginView');
        const signup = document.getElementById('signupView');
        const text = document.getElementById('toggleText');
        
        login.classList.toggle('hidden');
        signup.classList.toggle('hidden');
        
        if (login.classList.contains('hidden')) {
            text.innerHTML = 'Have an account? <span onclick="toggleView()">Log in</span>';
        } else {
            text.innerHTML = 'Don\'t have an account? <span onclick="toggleView()">Sign up</span>';
        }
    }
</script>
</body>
</html>
