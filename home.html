<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA Home</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
padding-bottom:70px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #222;
font-size:24px;
font-weight:bold;
}

  .stories{
display:flex;
overflow-x:auto;
padding:15px;
gap:15px;
border-bottom:1px solid #222;
}

.story{
text-align:center;
min-width:80px;
}

.story img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid #ff2d55;
object-fit:cover;
}

.story p{
margin-top:5px;
font-size:12px;
}

.feed{
padding:0;
}

.post{
background:#000;
padding:0;
margin-bottom:20px;
border-radius:0;
}

.post img{
width:100%;
max-height:500px;
object-fit:cover;
border-radius:0;
}

.actions{
display:flex;
gap:20px;
font-size:24px;
margin-top:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:black;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #222;
font-size:24px;
}

  #notifDot{
width:10px;
height:10px;
background:#0095f6;
border-radius:50%;
position:absolute;
top:0;
right:-3px;
display:none;
}
  
</style>
</head>

<body>

<div class="topbar">

<div onclick="openUploadMenu()">
➕
</div>

<div>
GODLINSTA
</div>

<div style="position:relative;cursor:pointer;"
onclick="openNotifications()">

❤️

<span id="notifDot"></span>
  
</div>
  
</div>
  
<div class="stories">

<div class="story">
<img src="GODL LOGO.png">
<p>Your Story</p>
</div>

<div class="story">
<img src="GODL LOGO.png">
<p>User 1</p>
</div>

<div class="story">
<img src="GODL LOGO.png">
<p>User 2</p>
</div>

<div class="story">
<img src="GODL LOGO.png">
<p>User 3</p>
</div>

</div>

<div class="feed" id="feed">

</div>

<div class="bottom-nav">

<div onclick="location.href='home.html'">🏠</div>

<div onclick="location.href='reels.html'">🎬</div>

<div onclick="location.href='messages.html'">📩</div>

<div onclick="location.href='search.html'">🔍</div>

<div onclick="location.href='profile.html'">👤</div>

</div>
<script>

if(localStorage.getItem("hasNotification")=="true"){
document.getElementById("notifDot").style.display="block";
}

function openNotifications(){

localStorage.setItem("hasNotification","false");

document.getElementById("notifDot").style.display="none";

location.href="notifications.html";

}

function openUploadMenu(){

let choice = prompt(
"1 = Story Upload\n2 = Post Upload\n3 = Reels Upload\n4 = Live"
);

if(choice=="1"){
location.href="story-upload.html";
}

if(choice=="2"){
location.href="create-post.html";
}

if(choice=="3"){
location.href="reels-upload.html";
}

if(choice=="4"){
alert("Live Feature Coming Soon");
}

}

let posts = JSON.parse(localStorage.getItem("posts")) || [];

const feed = document.getElementById("feed");

posts.forEach(post => {

feed.innerHTML += `

<div class="post">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
">

<div style="
display:flex;
align-items:center;
gap:10px;
">

<img src="GODL LOGO.png"
style="
width:35px;
height:35px;
border-radius:50%;
">

<b>godl_shivaaaaa</b>

</div>

<div>⋮</div>

</div>

<img src="${post.image}">

<div style="
display:flex;
justify-content:space-between;
padding:10px;
font-size:24px;
">

<div>
❤️ 💬 📤
</div>

<div>
🔖
</div>

</div>

<p style="padding:10px;">
<b>godl_shivaaaaa</b>
${post.caption}
</p>

</div>

`;

});

</script>

</body>
</html>
