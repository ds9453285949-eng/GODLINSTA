<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reels • GODLINSTA</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        .reel-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; }
        .reel-post { height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .reel-post video { width: 100%; height: 100%; object-fit: cover; }
        .ui-overlay { position: absolute; bottom: 80px; right: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-icon { cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div class="reel-container" id="reels"></div>

    <nav class="nav-bottom">
        <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
        <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
        <div class="nav-icon" onclick="location.href='create.html'">➕</div>
        <div class="nav-icon" onclick="location.href='reels.html'">🎬</div>
        <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
    </nav>

    <script type="module">
        import "./auth-guard.js";
        import { db } from "./firebase-config.js";
        import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const reelsDiv = document.getElementById("reels");

        // Sirf type="reel" wale post fetch karenge
        const q = query(collection(db, "posts"), where("type", "==", "reel"));
        
        onSnapshot(q, (snap) => {
            reelsDiv.innerHTML = "";
            snap.forEach(doc => {
                const reel = doc.data();
                reelsDiv.innerHTML += `
                    <div class="reel-post">
                        <video src="${reel.imageUrl}" autoplay loop muted playsinline></video>
                        <div class="ui-overlay">
                            <div style="font-size: 30px;">🤍</div>
                            <div style="font-size: 30px;">💬</div>
                        </div>
                        <div style="position:absolute; bottom:20px; left:20px;">
                            <b>@${reel.username}</b>
                            <p>${reel.caption}</p>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
