<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .setting-option { padding: 20px 0; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .logout { color: #ed4956; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="setting-option" onclick="location.href='edit-profile.html'">Edit Profile</div>
    <div class="setting-option">Privacy & Security</div>
    <div class="setting-option">Notifications</div>
    <div class="setting-option logout" id="logoutBtn">Log Out</div>

    <script type="module">
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        document.getElementById("logoutBtn").onclick = () => {
            signOut(getAuth()).then(() => location.href = "login.html");
        };
    </script>
</body>
</html>
