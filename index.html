<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
}

/* SPLASH SCREEN */

#welcome{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

#welcome img{
width:120px;
}

#welcome h1{
font-size:42px;
margin:20px 0 10px;
}

.rainbow{
font-size:20px;
font-weight:bold;
background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00aa00,
#0000ff,
#4b0082,
#8b00ff
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.openbtn{
background:#4f5dff;
color:white;
border:none;
padding:15px 30px;
border-radius:15px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}

.bottom{
position:fixed;
bottom:15px;
left:0;
width:100%;
text-align:center;
}

.madeby{
font-size:12px;
font-weight:700;
background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00aa00,
#0000ff,
#4b0082,
#8b00ff
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LOGIN PAGE */

.container{
max-width:320px;
margin:auto;
padding:25px 12px;
text-align:center;
display:none;
background:#000;
min-height:100vh;
}

.logo{
width:90px;
display:block;
margin:0 auto 10px;
}

.godlinsta-title{
font-size:34px;
font-weight:900;
letter-spacing:2px;
color:white;
margin:8px 0;
}

.godlinsta-tagline{
font-size:16px;
font-weight:bold;
margin-bottom:20px;
background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00aa00,
#0000ff,
#4b0082,
#8b00ff
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:15px;
margin:8px 0;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
background:#111;
color:white;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1877f2;
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.link{
display:block;
margin-top:15px;
color:#1877f2;
text-decoration:none;
font-size:18px;
}

.create{
background:#000;
color:#1877f2;
border:2px solid #1877f2;
margin-top:40px;
}

</style>
</head>

<body>

<div id="welcome">

<img src="GODL LOGO.png">

<h1>𝐆𝐎𝐃𝐋𝐈𝐍𝐒𝐓𝐀</h1>

<p class="rainbow">
India's Future Social Media App
</p>

<button class="openbtn">
GOLDINSTA APP SOON...
</button>

<span style="color:white;"> or </span>

<p style="margin-top:25px;">

<a href="#" onclick="openApp()" style="
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
">
Log In
</a>

<span style="color:white;"> or </span>

<a href="#" onclick="openSignupDirect()" style="
color:#4f5dff;
text-decoration:none;
font-size:20px;
font-weight:bold;
">
Sign Up
</a>

</p>
  
<div class="bottom">

<div style="
color:white;
font-size:18px;
font-weight:900;
letter-spacing:2px;
">
𝗙𝗥𝗢𝗠
</div>

<div class="madeby">
𝐌𝐀𝐃𝐄 𝐈𝐍 𝐁𝐘 𝐒𝐇𝐈𝐕𝐀
</div>

</div>

</div>

<div class="container" id="loginPage">

<img src="GODL LOGO.png" class="logo">

<h1 class="godlinsta-title">𝐆𝐎𝐃𝐋𝐈𝐍𝐒𝐓𝐀</h1>

<p class="godlinsta-tagline">
India's Future Social Media App
</p>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="btn">Log In</button>

<a href="#" class="link">Forgot Password?</a>

<button class="btn create" onclick="openSignup()">
Create New Account
</button>

</div>

<div class="container" id="signupPage" style="display:none;">

<img src="GODL LOGO.png" class="logo">

<h1 class="godlinsta-title">𝐂𝐑𝐄𝐀𝐓𝐄 𝐀𝐂𝐂𝐎𝐔𝐍𝐓</h1>

<p class="godlinsta-tagline">
Join GODLINSTA Today
</p>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Username">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="btn">Sign Up</button>

<button class="btn create" onclick="backToLogin()">
Back To Login
</button>

</div>

<script>

function openApp(){
document.getElementById("welcome").style.display="none";
document.getElementById("loginPage").style.display="block";
}

function openSignup(){
document.getElementById("loginPage").style.display="none";
document.getElementById("signupPage").style.display="block";
}

function backToLogin(){
document.getElementById("signupPage").style.display="none";
document.getElementById("loginPage").style.display="block";
}

  function openSignupDirect(){
document.getElementById("welcome").style.display="none";
document.getElementById("signupPage").style.display="block";
}

</script>

</body>
</html>
