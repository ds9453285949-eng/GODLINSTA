<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { display: flex; flex-direction: column; gap: 20px; max-width: 400px; margin: auto; }
        input, button { padding: 15px; border-radius: 8px; border: none; }
        button { background: #0095f6; color: #fff; font-weight: bold; cursor: pointer; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Create New Post</h3>
        <input type="text" id="imgUrl" placeholder="Enter Image URL">
        <input type="text" id="caption" placeholder="Write a caption...">
        <button id="uploadBtn">Share Post</button>
        <button onclick="history.back()" style="background:#333;">Cancel</button>
    </div>

    <script type="module">
        // Auth Guard aur Firebase Config import
        import "./auth-guard.js";
        import { auth, db } from "./firebase-config.js";
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const uploadBtn = document.getElementById("uploadBtn");

        function showNotification(msg) {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        uploadBtn.addEventListener("click", async () => {
            const imgUrl = document.getElementById("imgUrl").value;
            const caption = document.getElementById("caption").value;
            const user = auth.currentUser;

            if(!imgUrl || !caption) return showNotification("Please fill all fields!");
            if(!user) return showNotification("You must be logged in!");

            try {
                uploadBtn.innerText = "Uploading...";
                uploadBtn.disabled = true;

                await addDoc(collection(db, "posts"), {
                    userId: user.uid,
                    username: user.email.split('@')[0],
                    imageUrl: imgUrl,
                    caption: caption,
                    createdAt: serverTimestamp()
                });

                showNotification("Post Uploaded Successfully!");
                setTimeout(() => window.location.href = "home.html", 1000);

            } catch (error) {
                console.error(error);
                showNotification("Error: Could not upload.");
                uploadBtn.innerText = "Share Post";
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
