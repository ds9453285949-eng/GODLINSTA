<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Post - GODLINSTA</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
}

.preview{
width:100%;
height:300px;
object-fit:cover;
background:#111;
border-radius:10px;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
background:#111;
color:#fff;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
}

textarea{
height:100px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}
</style>

</head>
<body>

<div class="container">

<h1>Create Post</h1>

<img id="preview" class="preview">

<input type="file" id="postImage" accept="image/*">

<textarea id="caption" placeholder="Write Caption"></textarea>

<button id="postBtn">Post</button>

</div>
  
<script type="module">

import {
db,
collection,
addDoc,
serverTimestamp
} from "./firebase-config.js";

const CLOUD_NAME = "dxcdq1jxz";
const UPLOAD_PRESET = "godlinsta";

let selectedFile = null;

const postImage = document.getElementById("postImage");
const preview = document.getElementById("preview");
const postBtn = document.getElementById("postBtn");

postImage.addEventListener("change", function(){

selectedFile = this.files[0];

if(!selectedFile) return;

preview.src = URL.createObjectURL(selectedFile);

});

postBtn.addEventListener("click", async ()=>{

if(!selectedFile){
alert("Please Select Image");
return;
}

postBtn.innerText = "Uploading...";

try{

const formData = new FormData();

formData.append("file", selectedFile);
formData.append("upload_preset", UPLOAD_PRESET);

const upload = await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:formData
}
);

const cloudData = await upload.json();

await addDoc(
collection(db,"posts"),
{
image: cloudData.secure_url,
caption: document.getElementById("caption").value,
username: localStorage.getItem("username") || "godl_user",
likes: 0,
comments: 0,
createdAt: serverTimestamp()
}
);

alert("Post Uploaded Successfully");

location.href="home.html";

}catch(error){

console.log(error);
alert("Upload Failed");

}

});

</script>

</body>
</html>
