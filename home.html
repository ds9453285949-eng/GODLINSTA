<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODLINSTA</title>
    <!-- CSS yahan external file (style.css) se load ho rahi hai, jo humne pehle fix ki thi -->
    <link rel="stylesheet" href="style.css">
    <style>
        .post-card { background: #000; margin-bottom: 20px; }
        .post-header { padding: 10px; font-weight: bold; font-size: 14px; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #262626; }
        .post-actions { padding: 12px; display: flex; gap: 15px; font-size: 24px; }
        .caption { padding: 0 12px 15px; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div onclick="location.href='create.html'">➕</div>
        <div style="font-family: cursive; font-size: 20px;">GODLINSTA</div>
        <div onclick="location.href='notifications.html'">❤️</div>
    </header>

    <div id="feed">
        <!-- Skeleton Loaders -->
        <div class="post-card"><div class="skeleton" style="height: 50px; width:100%;"></div></div>
        <div class="post-card"><div class="skeleton" style="height: 350px; width:100%;"></div></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
        <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
        <div class="nav-icon" onclick="location.href='create.html'">➕</div>
        <div class="nav-icon" onclick="location.href='messages.html'">✈️</div>
        <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
    </nav>

    <script type="module">
        import "./auth-guard.js";
        import { db, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp } from "./firebase-config.js";

        const feed = document.getElementById("feed");

        // Like Post Logic
        window.likePost = async (btn, postId) => {
            btn.innerHTML = "❤️"; 
            await addDoc(collection(db, "likes"), { postId, timestamp: serverTimestamp() });
        };

        // Real-time Feed
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                feed.innerHTML += `
                    <div class="post-card">
                        <div class="post-header">@${p.username || 'user'}</div>
                        <img src="${p.imageUrl}" class="post-img" onerror="this.style.display='none'">
                        <div class="post-actions">
                            <span onclick="likePost(this, '${doc.id}')" style="cursor:pointer">🤍</span>
                            <span style="cursor:pointer">💬</span>
                            <span onclick="location.href='chat.html'" style="cursor:pointer">✈️</span>
                        </div>
                        <div class="caption"><b>${p.username || 'user'}</b> ${p.caption || ''}</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
