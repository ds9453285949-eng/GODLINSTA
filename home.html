<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GODLINSTA</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 1px solid #333; z-index: 100; }
        .feed-container { padding: 50px 0; }
        .post { border-bottom: 1px solid #333; margin-bottom: 20px; }
        .post-img { width: 100%; }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; padding: 15px;">
        <div style="font-weight: bold; font-size: 20px;">GODLINSTA</div>
        <div>➕ ❤️</div>
    </header>

    <div class="feed-container" id="feed">
        <p style="text-align:center;">Loading Real-time Feed...</p>
    </div>

    <nav class="nav-bottom">
        <div onclick="location.href='home.html'">🏠</div>
        <div onclick="location.href='search.html'">🔍</div>
        <div onclick="location.href='reels.html'">🎬</div>
        <div onclick="location.href='messages.html'">✈️</div>
        <div onclick="location.href='profile.html'">👤</div>
    </nav>

    <script type="module">
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        
        // Initialize DB
        const db = getFirestore();
        
        // Real-time Feed Listener (Flowchart requirement)
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const post = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <p><b>${post.username}</b></p>
                        <img src="${post.imageUrl}" class="post-img">
                        <p>${post.caption}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
