<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        .chat-area { height: 85vh; overflow-y: scroll; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #262626; padding: 10px 15px; border-radius: 15px; max-width: 70%; word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #0095f6; }
        .input-area { position: fixed; bottom: 0; width: 100%; display: flex; padding: 10px; background: #000; border-top: 1px solid #333; box-sizing: border-box; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: #fff; margin-right: 10px; }
        button { padding: 10px 20px; border-radius: 20px; background: #0095f6; border: none; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-area" id="chatList"></div>
    
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Message...">
        <button id="sendBtn">Send</button>
    </div>

    <script type="module">
        import "./auth-guard.js";
        import { auth, db } from "./firebase-config.js";
        import { collection, addDoc, serverTimestamp, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const chatList = document.getElementById("chatList");
        const sendBtn = document.getElementById("sendBtn");

        // Load Real-time Messages
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            chatList.innerHTML = "";
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const isMine = msg.senderId === auth.currentUser.uid;
                chatList.innerHTML += `
                    <div class="msg ${isMine ? 'my-msg' : ''}">
                        ${msg.messageText}
                    </div>
                `;
            });
            chatList.scrollTop = chatList.scrollHeight; // Auto-scroll to bottom
        });

        // Send Message
        sendBtn.addEventListener("click", async () => {
            const msgInput = document.getElementById("msgInput");
            const msg = msgInput.value;
            if(!msg) return;

            try {
                sendBtn.disabled = true;
                await addDoc(collection(db, "messages"), {
                    messageText: msg,
                    senderId: auth.currentUser.uid,
                    createdAt: serverTimestamp()
                });
                msgInput.value = "";
                sendBtn.disabled = false;
            } catch (error) {
                alert("Failed to send!");
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
