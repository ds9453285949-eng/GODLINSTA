<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reels • GODLINSTA</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; }
        .reel-container { height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .reel-post { height: 100vh; scroll-snap-align: start; position: relative; }
        .reel-post video { width: 100%; height: 100%; object-fit: cover; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
    </style>
</head>
<body>

    <div class="reel-container" id="reels">
        </div>

    <nav class="bottom-nav">
        <div onclick="location.href='home.html'">🏠</div>
        <div onclick="location.href='search.html'">🔍</div>
        <div onclick="location.href='reels.html'">🎬</div>
        <div onclick="location.href='messages.html'">✈️</div>
        <div onclick="location.href='profile.html'">👤</div>
    </nav>

    <script type="module">
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const db = getFirestore();

        onSnapshot(collection(db, "posts"), (snap) => {
            const reelsDiv = document.getElementById("reels");
            reelsDiv.innerHTML = "";
            snap.forEach(doc => {
                const reel = doc.data();
                if(reel.type === "reel") { // Sirf reels dikhao
                    reelsDiv.innerHTML += `
                        <div class="reel-post">
                            <video src="${reel.imageUrl}" autoplay loop muted></video>
                        </div>
                    `;
                }
            });
        });
    </script>
</body>
</html>
