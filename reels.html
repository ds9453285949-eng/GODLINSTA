<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family: sans-serif; }
        #appHeader { position:fixed; top:10px; width:100%; text-align:center; color:white; z-index:99; font-weight:bold; }
        #reelsContainer { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; }
        .reel-card { height:100vh; scroll-snap-align:start; position:relative; }
        video { height:100%; width:100%; object-fit:cover; }
        .ui-right { position:absolute; bottom:100px; right:15px; color:#fff; }
        .ui-right div { margin-bottom:25px; font-size:28px; }
        .caption { position:absolute; bottom:20px; left:15px; color:#fff; width:70%; }
    </style>
</head>
<body>
    <div id="appHeader">GODLINSTA</div>
    <div id="reelsContainer"></div>

    <script type="module">
        import { db, collection, query, orderBy, onSnapshot } from "./firebase-config.js";
        const container = document.getElementById("reelsContainer");
        
        onSnapshot(query(collection(db, "reels"), orderBy("createdat", "desc")), (snap) => {
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="reel-card">
                        <video src="${d.videourl}" loop autoplay playsinline muted></video>
                        <div class="ui-right">
                            <div>❤️</div>
                            <div>💬</div>
                            <div>➤</div>
                        </div>
                        <div class="caption"><strong>@godlinsta</strong> ${d.caption || ""}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
