```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#fafafa;
}

/* SPLASH SCREEN */

#welcome{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#000;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:999;
}

#welcome img{
width:110px;
}

#welcome h1{
font-size:42px;
margin:20px 0 10px;
}

.openbtn{
background:#4f5dff;
color:white;
border:none;
padding:15px 30px;
border-radius:15px;
font-size:20px;
margin-top:20px;
cursor:pointer;
}

.bottom{
position:absolute;
bottom:25px;
left:0;
width:100%;
text-align:center;
}

/* LOGIN PAGE */

.container{
max-width:320px;
margin:auto;
padding:25px 12px;
text-align:center;
display:none;
}

.logo{
width:90px;
display:block;
margin:0 auto 10px;
}

.godlinsta-title{
font-size:34px;
font-weight:900;
letter-spacing:2px;
color:#000;
margin:8px 0;
}

.godlinsta-tagline{
font-size:16px;
font-weight:bold;
margin-bottom:20px;
background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00aa00,
#0000ff,
#4b0082,
#8b00ff
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:15px;
margin:8px 0;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1877f2;
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.link{
display:block;
margin-top:15px;
color:#1877f2;
text-decoration:none;
font-size:18px;
}

.create{
background:white;
color:#1877f2;
border:2px solid #1877f2;
margin-top:40px;
}

.rainbow{
font-size:20px;
font-weight:bold;
background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00aa00,
#0000ff,
#4b0082,
#8b00ff
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.madeby{
margin-top:4px;
font-size:12px;
font-weight:700;
background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00aa00,
#0000ff,
#4b0082,
#8b00ff
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

@media screen and (min-width:900px){

.bottom{
bottom:40px;
}

.madeby{
font-size:16px;
}

}

</style>
</head>

<body>

<div id="welcome">

<img src="GODL LOGO.png">

<h1>𝐆𝐎𝐃𝐋𝐈𝐍𝐒𝐓𝐀</h1>

<p class="rainbow">
India's Future Social Media App
</p>

<button class="openbtn" onclick="openApp()">
Open GODLINSTA
</button>

<p style="margin-top:25px;">Log In or Sign Up</p>

<div class="bottom">

<div style="
color:white;
font-size:18px;
font-weight:900;
letter-spacing:2px;
">
𝗙𝗥𝗢𝗠
</div>

<div class="madeby">
𝐌𝐀𝐃𝐄 𝐈𝐍 𝐁𝐘 𝐒𝐇𝐈𝐕𝐀
</div>

</div>

</div>

<div class="container" id="loginPage">

<img src="GODL LOGO.png" class="logo">

<h1 class="godlinsta-title">𝐆𝐎𝐃𝐋𝐈𝐍𝐒𝐓𝐀</h1>

<p class="godlinsta-tagline">
India's Future Social Media App
</p>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="btn">Log In</button>

<a href="#" class="link">Forgot Password?</a>

<button class="btn create">Create New Account</button>

</div>

<script>
function openApp(){
document.getElementById("welcome").style.display="none";
document.getElementById("loginPage").style.display="block";
}
</script>

</body>
</html>
