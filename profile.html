<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA Profile</title>
  
  <link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="container">

<img id="profileImage" src="GODL LOGO.png" class="profile-pic">

<div class="username" id="username">
@username
</div>

<div class="name" id="name">
Your Name
</div>

<div class="bio" id="bio">
No bio yet
</div>

<a href="#" id="website" class="link">
No Website
</a>

<div class="stats">

<div class="stat">
<h3>0</h3>
<p>Posts</p>
</div>

<div class="stat">
<h3>0</h3>
<p>Followers</p>
</div>

<div class="stat">
<h3>0</h3>
<p>Following</p>
</div>

</div>

<button class="btn" onclick="location.href='edit-profile.html'">
Edit Profile
</button>

  <button class="btn" onclick="location.href='create-post.html'">
➕ Create Post
</button>

<button class="btn logout" onclick="location.href='login.html'">
Logout
</button>

  <h2 style="margin-top:30px;">Posts</h2>

<div id="postsGrid" style="
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
margin-top:10px;
"></div>

</div>

<script>

document.getElementById("profileImage").src =
localStorage.getItem("profilePic") || "GODL LOGO.png";

document.getElementById("username").innerText =
localStorage.getItem("username") || "@username";

document.getElementById("name").innerText =
localStorage.getItem("name") || "Your Name";

document.getElementById("bio").innerText =
localStorage.getItem("bio") || "No bio yet";

document.getElementById("website").innerText =
localStorage.getItem("website") || "No Website";

document.getElementById("website").href =
localStorage.getItem("website") || "#";

  const posts = JSON.parse(localStorage.getItem("posts")) || [];

document.querySelector(".stat h3").innerText = posts.length;

const postsGrid = document.getElementById("postsGrid");

posts.forEach(post => {

const img = document.createElement("img");

img.src = post.image;

img.style.width = "100%";
img.style.aspectRatio = "1/1";
img.style.objectFit = "cover";

postsGrid.appendChild(img);

});

</script>

</body>
</html>
