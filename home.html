<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; padding-bottom:70px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #262626; background:#000; position:sticky; top:0; z-index:1000; }
        
        /* Story Section */
        #stories { display:flex; overflow-x:scroll; padding:10px; gap:15px; border-bottom:1px solid #262626; }
        .story-ring { width:65px; height:65px; border-radius:50%; border:3px solid #f00; padding:2px; }
        .story-img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

        .post { width:100%; max-width:400px; margin:auto; border-bottom:1px solid #262626; }
        .post-img { width:100%; aspect-ratio:1/1; object-fit:cover; }
        .actions { display:flex; justify-content:space-between; padding:12px; font-size:26px; }
        .bottom-nav { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.9); display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #262626; font-size:24px; z-index:1000; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="font-size:24px;">GODLINSTA</div>
    <div style="font-size:24px;" onclick="location.href='notifications.html'">❤️</div>
</div>

<div id="stories">
    <div class="story-ring"><img src="your-avatar.jpg" class="story-img"></div>
    <div class="story-ring" style="border-color:#fff;"><img src="friend.jpg" class="story-img"></div>
</div>

<div class="feed" id="feed"></div>

<div class="bottom-nav">
    <div onclick="location.href='home.html'">🏠</div>
    <div onclick="location.href='search.html'">🔍</div>
    <div onclick="location.href='create.html'">➕</div>
    <div onclick="location.href='reels.html'">🎬</div>
    <div onclick="location.href='profile.html'">👤</div>
</div>

<script type="module">
    import { db, collection, query, orderBy, onSnapshot } from "./firebase-config.js";

    const feed = document.getElementById("feed");
    // Firestore se data fetch
    onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
        feed.innerHTML = "";
        snap.forEach((doc) => {
            const p = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <div style="padding:10px; font-weight:bold;">${p.username}</div>
                    <img src="${p.image}" class="post-img">
                    <div class="actions">
                        <span>❤️ 💬 ✈️</span>
                        <span>🔖</span>
                    </div>
                    <div style="padding:0 10px 10px;"><b>${p.username}</b> ${p.caption}</div>
                </div>`;
        });
    });
</script>
</body>
</html>
