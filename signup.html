<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 350px; padding: 20px; text-align: center; }
        .logo { font-size: 30px; font-weight: 800; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 6px 0; background: #121212; color: #fff; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #suggestionBox { font-size: 12px; margin: 5px 0 15px 0; min-height: 15px; color: #aaa; cursor: pointer; }
        .back-btn { background: transparent; border: 1px solid #333; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">GODLINSTA</div>
    <input type="text" id="fullname" placeholder="Full Name">
    <input type="text" id="username" placeholder="Username">
    <div id="suggestionBox"></div>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" id="signupBtn">Sign Up</button>
    <a href="login.html" style="text-decoration:none;"><button class="btn back-btn">Back To Login</button></a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDJSmirvoIwieTr25NQUOtAHF-v_aTINoM", authDomain: "godlinsta.firebaseapp.com", projectId: "godlinsta", storageBucket: "godlinsta.firebasestorage.app", messagingSenderId: "808932933868", appId: "1:808932933868:web:098b5e9cb0fd4e856065c9" };
    const auth = getAuth(initializeApp(firebaseConfig));
    const db = getFirestore();

    // Username Availability Logic
    const unameInput = document.getElementById("username");
    const suggBox = document.getElementById("suggestionBox");

    unameInput.addEventListener("input", async (e) => {
        const val = e.target.value.toLowerCase().trim();
        if(val.length < 3) { suggBox.innerText = ""; return; }
        
        const snap = await getDocs(query(collection(db, "users"), where("username", "==", val)));
        if(!snap.empty) {
            const randomUser = val + Math.floor(Math.random() * 999);
            suggBox.innerHTML = `Not available. Try: <span style="color:#0095f6;">${randomUser}</span>`;
            suggBox.onclick = () => unameInput.value = randomUser;
        } else {
            suggBox.innerHTML = '<span style="color:#2ecc71;">✓ Username available</span>';
        }
    });

    document.getElementById("signupBtn").addEventListener("click", async () => {
        const btn = document.getElementById("signupBtn");
        const fullname = document.getElementById("fullname").value.trim();
        const username = unameInput.value.toLowerCase().trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if(!fullname || !username || !email || !password) { alert("Please fill all fields!"); return; }
        
        btn.disabled = true; 
        btn.innerText = "Creating Account...";

        try {
            const snap = await getDocs(query(collection(db, "users"), where("username", "==", username)));
            if(!snap.empty) throw new Error("Username already taken!");
            
            await createUserWithEmailAndPassword(auth, email, password);
            await addDoc(collection(db, "users"), { fullname, username, email, followers:0, following:0, posts:0, bio: "" });
            
            alert("Account Created Successfully!");
            window.location.href = "login.html";
        } catch(e) { 
            alert(e.message); 
            btn.disabled = false; 
            btn.innerText = "Sign Up"; 
        }
    });
</script>
</body>
</html>
