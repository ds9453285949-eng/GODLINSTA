<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODLINSTA</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .splash { text-align: center; color: white; }
        .logo { width: 120px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="splash">
        <img src="GODL LOGO.png" class="logo">
        <p>From GODL</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDJSmirvoIwieTr25NQUOtAHF-v_aTINoM", authDomain: "godlinsta.firebaseapp.com", projectId: "godlinsta", storageBucket: "godlinsta.firebasestorage.app", messagingSenderId: "808932933868", appId: "1:808932933868:web:098b5e9cb0fd4e856065c9" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Session Check Logic
        onAuthStateChanged(auth, (user) => {
            setTimeout(() => {
                if (user) {
                    window.location.replace("home.html"); // Session Valid -> Home Page
                } else {
                    window.location.replace("auth.html"); // No Session -> Login/Signup
                }
            }, 2000); // 2 second ka Splash screen delay
        });
    </script>
</body>
</html>
