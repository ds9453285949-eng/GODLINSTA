<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA</title>

<style>

body{
margin:0;
background:#fafafa;
font-family:Arial,sans-serif;
}

.container{
max-width:320px;
margin:auto;
padding:25px 12px;
text-align:center;
}

.logo{
width:90px;
display:block;
margin:0 auto 10px;
}

.godlinsta-title{
font-size:34px;
font-weight:900;
letter-spacing:2px;
color:#000;
margin:8px 0;
}

.godlinsta-tagline{
font-size:16px;
font-weight:bold;
margin-bottom:20px;

background:linear-gradient(
90deg,
#ff0000,
#ff7f00,
#ffff00,
#00aa00,
#0000ff,
#4b0082,
#8b00ff
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:15px;
margin:8px 0;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#1877f2;
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.link{
display:block;
margin-top:15px;
color:#1877f2;
text-decoration:none;
font-size:18px;
}

.create{
background:white;
color:#1877f2;
border:2px solid #1877f2;
margin-top:40px;
}

</style>
</head>

<body>

<div class="container">

<img src="GODL LOGO.png" class="logo" alt="GODLINSTA Logo">

<h1 class="godlinsta-title">𝐆𝐎𝐃𝐋𝐈𝐍𝐒𝐓𝐀</h1>

<p class="godlinsta-tagline">
India's Future Social Media App
</p>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="btn">Log In</button>

<a href="#" class="link">Forgot Password?</a>

<button class="btn create">Create New Account</button>

</div>

</body>
</html>
