<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:320px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:15px;
margin:8px 0;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:14px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="GODL LOGO.png" width="90">

<h1>Forgot Password</h1>

<input type="email" id="email" placeholder="Enter Your Email">

<button class="btn" id="resetBtn">
Send Reset Link
</button>

</div>

</body>
</html>
