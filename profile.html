<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; padding-bottom:70px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #1a1a1a; }
        
        /* Profile Header */
        .profile-header { display:flex; align-items:center; padding:20px; gap:20px; }
        .profile-pic { width:85px; height:85px; border-radius:50%; background:#333; object-fit:cover; }
        .stats { display:flex; gap:20px; text-align:center; }
        
        /* Info & Buttons */
        .profile-info { padding:0 20px 10px; }
        .profile-buttons { display:flex; padding:0 20px 20px; gap:8px; }
        .profile-buttons button { background:#1a1a1a; border:none; color:white; padding:8px; border-radius:8px; font-weight:600; cursor:pointer; flex:1; font-size:14px; }
        
        /* Grid */
        .profile-posts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .profile-posts img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background:#111; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index:1000; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="cursor:pointer;" onclick="location.href='create.html'">➕</div>
    <div id="username" style="font-weight:bold;">Loading...</div>
    <div>☰</div>
</div>

<div class="profile-header">
    <img id="profileImage" src="https://ui-avatars.com/api/?name=User" class="profile-pic">
    <div class="stats">
        <div><h3 id="postsCount">0</h3><p style="font-size:12px;color:#aaa;">Posts</p></div>
        <div><h3>0</h3><p style="font-size:12px;color:#aaa;">Followers</p></div>
        <div><h3>0</h3><p style="font-size:12px;color:#aaa;">Following</p></div>
    </div>
</div>

<div class="profile-info">
    <h3 id="name" style="margin:0;"></h3>
    <div id="bio" style="font-size:14px; color:#ddd; margin-top:5px;"></div>
</div>

<div class="profile-buttons">
    <button onclick="location.href='edit-profile.html'">Edit Profile</button>
    <button>Share Profile</button>
</div>

<div id="profilePosts" class="profile-posts"></div>

<nav class="bottom-nav">
    <div onclick="location.href='home.html'">🏠</div>
    <div onclick="location.href='search.html'">🔍</div>
    <div onclick="location.href='create.html'">➕</div>
    <div onclick="location.href='reels.html'">🎬</div>
    <div onclick="location.href='profile.html'">👤</div>
</nav>

<script type="module">
    import { auth, db, collection, query, where, getDocs } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    onAuthStateChanged(auth, async (user) => {
        if(!user){ window.location.href = "login.html"; return; }

        const snap = await getDocs(query(collection(db,"users"), where("email","==",user.email)));
        if(!snap.empty){
            const data = snap.docs[0].data();
            document.getElementById("username").innerText = data.username;
            document.getElementById("name").innerText = data.fullname || "";
            document.getElementById("bio").innerText = data.bio || "";
            if(data.profilePic) document.getElementById("profileImage").src = data.profilePic;

            const postsSnap = await getDocs(query(collection(db,"posts"), where("username","==",data.username)));
            const profilePosts = document.getElementById("profilePosts");
            
            profilePosts.innerHTML = "";
            postsSnap.forEach((doc)=>{
                profilePosts.innerHTML += `<img src="${doc.data().image}">`;
            });
            document.getElementById("postsCount").innerText = postsSnap.size;
        }
    });
</script>
</body>
</html>
