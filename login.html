<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA Login</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:320px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:15px;
margin:8px 0;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:14px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}

.create{
background:black;
color:#1877f2;
border:2px solid #1877f2;
}

.link{
color:#1877f2;
text-decoration:none;
display:block;
margin-top:15px;
}
</style>

</head>
<body>

<div class="container">

<img src="GODL LOGO.png" width="90">

<h1>𝐆𝐎𝐃𝐋𝐈𝐍𝐒𝐓𝐀</h1>

<p style="color:#4f5dff;">
India's Future Social Media App
</p>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button class="btn" id="loginBtn">
Log In
</button>

<a href="forgot.html" class="link">
Forgot Password?
</a>
  
<br>

<a href="signup.html">
<button class="btn create">
Create New Account
</button>
</a>

</div>

 <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
   
import {
getAuth,
signInWithEmailAndPassword,
sendPasswordResetEmail,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

   import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
   
const firebaseConfig = {
apiKey: "AIzaSyDJSmirvoIwieTr25NQUOtAHF-v_aTINoM",
authDomain: "godlinsta.firebaseapp.com",
projectId: "godlinsta",
storageBucket: "godlinsta.firebasestorage.app",
messagingSenderId: "808932933868",
appId: "1:808932933868:web:098b5e9cb0fd4e856065c9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {

if(user){
window.location.replace("profile.html");
}

});

document.getElementById("loginBtn").addEventListener("click", async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

const q = query(
collection(db,"users"),
where("email","==",email)
);

const snap = await getDocs(q);

if(!snap.empty){

const data = snap.docs[0].data();

localStorage.setItem(
"currentUsername",
data.username
);

}

alert("Login Successful");

window.location.replace("profile.html");

}catch(error){

alert(error.message);

}

});
   

</script>
  
</body>
</html>
