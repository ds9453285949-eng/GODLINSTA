<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .top-bar { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #333; gap: 20px; }
        .chat-list { padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; }
        .avatar { width: 50px; height: 50px; background: #333; border-radius: 50%; margin-right: 15px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span onclick="window.location.href='home.html'">⬅️</span>
        <h3>Direct Messages</h3>
    </div>
    
    <div class="chat-list" id="chatList">
        <p style="text-align:center; color:gray;">Loading chats...</p>
    </div>

    <script type="module">
        import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const db = getFirestore();
        const auth = getAuth();
        
        // Current user ke messages load karo
        onAuthStateChanged(auth, (user) => {
            if (user) {
                const q = query(collection(db, "messages"), where("receiverId", "==", user.uid));
                onSnapshot(q, (snapshot) => {
                    const chatList = document.getElementById("chatList");
                    chatList.innerHTML = "";
                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        chatList.innerHTML += `
                            <div class="chat-item">
                                <div class="avatar"></div>
                                <div>
                                    <p>User</p>
                                    <small>${msg.messageText}</small>
                                </div>
                            </div>
                        `;
                    });
                });
            }
        });
    </script>
</body>
</html>
