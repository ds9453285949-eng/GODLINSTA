<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA Home</title>

<style>

body{
margin:0;
background:#000;
color:white;
font-family:Arial,sans-serif;
padding-bottom:70px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-bottom:1px solid #222;
font-size:24px;
font-weight:bold;
}

.feed{
padding:15px;
}

.post{
background:#111;
border-radius:12px;
padding:12px;
margin-bottom:15px;
}

.post img{
width:100%;
border-radius:12px;
}

.actions{
display:flex;
gap:20px;
font-size:24px;
margin-top:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:black;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #222;
font-size:24px;
}

  #notifDot{
width:10px;
height:10px;
background:#0095f6;
border-radius:50%;
position:absolute;
top:0;
right:-3px;
display:none;
}
  
</style>
</head>

<body>

<div class="topbar">

<div onclick="openUploadMenu()">
➕
</div>

<div>
GODLINSTA
</div>

<div style="position:relative;cursor:pointer;"
onclick="openNotifications()">

❤️

<span id="notifDot"></span>

</div>

</div>

<div class="feed" id="feed">

</div>

<div class="bottom-nav">

<div onclick="location.href='home.html'">🏠</div>

<div onclick="location.href='reels.html'">🎬</div>

<div onclick="location.href='messages.html'">📩</div>

<div onclick="location.href='search.html'">🔍</div>

<div onclick="location.href='profile.html'">👤</div>

</div>
<script>

if(localStorage.getItem("hasNotification")=="true"){
document.getElementById("notifDot").style.display="block";
}

  function openNotifications(){

localStorage.setItem("hasNotification","false");

document.getElementById("notifDot").style.display="none";

location.href="notifications.html";

}

  function openUploadMenu(){

let choice = prompt(
"1 = Post Upload\n2 = Reels Upload"
);

if(choice=="1"){
location.href="create-post.html";
}

if(choice=="2"){
location.href="reels-upload.html";
}

    function openNotifications(){

localStorage.setItem("hasNotification","false");

document.getElementById("notifDot").style.display="none";

location.href="notifications.html";

}

function openUploadMenu(){

let choice = prompt(
"1 = Story Upload\n2 = Post Upload\n3 = Reels Upload\n4 = Live"
);

if(choice=="1"){
location.href="story-upload.html";
}

if(choice=="2"){
location.href="create-post.html";
}

if(choice=="3"){
location.href="reels-upload.html";
}

if(choice=="4"){
alert("Live Feature Coming Soon");
}
  
</script>
</body>
</html>
