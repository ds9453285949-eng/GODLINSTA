<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat • GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; display:flex; flex-direction:column; height:100vh; }
        .topbar { padding:15px; border-bottom:1px solid #1a1a1a; display:flex; align-items:center; gap:10px; background:#000; position:sticky; top:0; z-index:100; }
        #chatBox { flex:1; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; scrollbar-width: none; }
        .msg { padding:10px 15px; border-radius:18px; max-width:75%; font-size:15px; word-wrap: break-word; }
        .sent { align-self:flex-end; background:#0095f6; color:white; }
        .received { align-self:flex-start; background:#262626; color:white; }
        .input-area { padding:10px; display:flex; gap:10px; border-top:1px solid #1a1a1a; background:#000; align-items: center; }
        input { flex:1; background:#121212; border:1px solid #333; color:#fff; padding:12px; border-radius:25px; outline:none; padding-left: 20px; }
        button { background:none; border:none; color:#0095f6; font-weight:bold; cursor:pointer; padding: 10px; }
    </style>
</head>
<body>

<div class="topbar">
    <div onclick="history.back()" style="cursor:pointer;">⬅️</div>
    <strong id="chatUser">Chatting...</strong>
</div>

<div id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { db } from "./firebase-config.js";
    import { collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const auth = getAuth();
    const chatId = new URLSearchParams(window.location.search).get("id"); // URL se chat ID
    const chatBox = document.getElementById("chatBox");

    // Real-time message load
    if (chatId) {
        const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            chatBox.innerHTML = "";
            snap.forEach((doc) => {
                const m = doc.data();
                const isSent = m.senderId === auth.currentUser.email;
                chatBox.innerHTML += `<div class="msg ${isSent ? 'sent' : 'received'}">${m.text}</div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight; // Auto scroll
        });
    }

    window.sendMessage = async () => {
        const input = document.getElementById("msgInput");
        if(input.value.trim() === "" || !chatId) return;

        await addDoc(collection(db, "chats", chatId, "messages"), {
            text: input.value,
            createdAt: serverTimestamp(),
            senderId: auth.currentUser.email
        });
        input.value = "";
    };
</script>
</body>
</html>
