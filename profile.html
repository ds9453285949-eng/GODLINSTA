<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile • GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; padding-bottom:70px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #1a1a1a; position:sticky; top:0; background:#000; z-index:1000; }
        .profile-header { display:flex; align-items:center; padding:20px; gap:25px; }
        .profile-pic { width:85px; height:85px; border-radius:50%; background:#222; object-fit:cover; border:1px solid #333; }
        .stats { display:flex; gap:20px; text-align:center; flex:1; justify-content: space-around; }
        .stats h3 { margin:0; font-size:16px; }
        .stats p { margin:0; font-size:12px; color:#aaa; }
        .profile-info { padding:0 20px 15px; }
        .profile-buttons { display:flex; padding:0 20px 20px; gap:8px; }
        .profile-buttons button { background:#1a1a1a; border:none; color:white; padding:8px; border-radius:8px; font-weight:600; cursor:pointer; flex:1; font-size:13px; }
        .profile-posts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .profile-posts img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background:#111; cursor:pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index:1000; }
        .nav-icon { font-size:24px; cursor:pointer; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="nav-icon" onclick="location.href='create.html'">➕</div>
    <div id="username" style="font-weight:bold; font-size:18px;">Loading...</div>
    <div class="nav-icon" id="logoutBtn" style="cursor:pointer;">🚪</div>
</div>

<div class="profile-header">
    <img id="profileImage" src="https://ui-avatars.com/api/?name=User" class="profile-pic">
    <div class="stats">
        <div><h3 id="postsCount">0</h3><p>Posts</p></div>
        <div><h3>0</h3><p>Followers</p></div>
        <div><h3>0</h3><p>Following</p></div>
    </div>
</div>

<div class="profile-info">
    <h3 id="name" style="margin:0; font-size:15px;"></h3>
    <div id="bio" style="font-size:13px; color:#ddd; margin-top:3px;"></div>
</div>

<div class="profile-buttons">
    <button onclick="location.href='edit-profile.html'">Edit Profile</button>
    <button>Share Profile</button>
</div>

<div id="profilePosts" class="profile-posts"></div>

<nav class="bottom-nav">
    <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
    <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
    <div class="nav-icon" onclick="location.href='create.html'">➕</div>
    <div class="nav-icon" onclick="location.href='reels.html'">🎬</div>
    <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
</nav>

<script type="module">
    import "./auth-guard.js";
    import { auth, db } from "./firebase-config.js"; 
    import { collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Wait for auth to initialize before fetching data
    auth.onAuthStateChanged((user) => {
        if (!user) return;

        // Fetch User Info
        const userQuery = query(collection(db, "users"), where("email", "==", user.email));
        onSnapshot(userQuery, (snap) => {
            if(!snap.empty){
                const data = snap.docs[0].data();
                document.getElementById("username").innerText = data.username;
                document.getElementById("name").innerText = data.full_name || "New User";
                document.getElementById("bio").innerText = data.bio || "No bio yet.";
            }
        });

        // Fetch ONLY current user's posts
        const postsQuery = query(
            collection(db, "posts"), 
            where("userId", "==", user.uid), 
            orderBy("createdAt", "desc")
        );
        
        onSnapshot(postsQuery, (snap) => {
            const profilePosts = document.getElementById("profilePosts");
            profilePosts.innerHTML = "";
            let count = 0;
            snap.forEach((doc) => {
                const post = doc.data();
                profilePosts.innerHTML += `<img src="${post.imageUrl}">`;
                count++;
            });
            document.getElementById("postsCount").innerText = count;
        });
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
        signOut(auth).then(() => window.location.replace("auth.html"));
    });
</script>
</body>
</html>
