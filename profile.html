<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile • GODLINSTA</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

<div class="topbar">
    <div id="username" style="font-weight:bold; font-size:18px;">Loading...</div>
    <div class="nav-icon" id="logoutBtn" style="cursor:pointer;">🚪</div>
</div>

<div class="profile-header">
    <img id="profileImage" src="https://ui-avatars.com/api/?name=User" class="profile-pic">
    <div class="stats">
        <div><h3 id="postsCount">0</h3><p>Posts</p></div>
        <div><h3 id="followersCount">0</h3><p>Followers</p></div>
        <div><h3 id="followingCount">0</h3><p>Following</p></div>
    </div>
</div>

<div class="profile-info">
    <h3 id="name" style="margin:0; font-size:15px;"></h3>
    <div id="bio" style="font-size:13px; color:#ddd; margin-top:3px;"></div>
</div>

<div class="profile-buttons" id="actionButtons">
    </div>

<div id="profilePosts" class="profile-posts"></div>

<nav class="bottom-nav">
    <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
    <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
    <div class="nav-icon" onclick="location.href='create.html'">➕</div>
    <div class="nav-icon" onclick="location.href='messages.html'">✈️</div>
    <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
</nav>

<script type="module">
    import { auth, db } from "./firebase-config.js"; 
    import { collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const urlParams = new URLSearchParams(window.location.search);
    const profileUid = urlParams.get("uid"); // Agar URL mein UID hai, toh wo profile dikhao

    auth.onAuthStateChanged((user) => {
        if (!user) return;
        const targetUid = profileUid || user.uid; // Agar UID nahi, toh apni profile

        // UI Logic: Show Edit or Follow/Message
        const btnContainer = document.getElementById("actionButtons");
        if (!profileUid || profileUid === user.uid) {
            btnContainer.innerHTML = `<button onclick="location.href='edit-profile.html'">Edit Profile</button><button>Share Profile</button>`;
        } else {
            btnContainer.innerHTML = `<button style="background:#0095f6;">Follow</button><button onclick="location.href='chat.html?id=${profileUid}'">Message</button>`;
        }

        // Fetch Data
        const userQuery = query(collection(db, "users"), where("uid", "==", targetUid));
        onSnapshot(userQuery, (snap) => {
            if(!snap.empty){
                const data = snap.docs[0].data();
                document.getElementById("username").innerText = data.username;
                document.getElementById("name").innerText = data.full_name || "";
                document.getElementById("bio").innerText = data.bio || "";
            }
        });

        // Posts
        const postsQuery = query(collection(db, "posts"), where("userId", "==", targetUid), orderBy("createdAt", "desc"));
        onSnapshot(postsQuery, (snap) => {
            const profilePosts = document.getElementById("profilePosts");
            profilePosts.innerHTML = "";
            let count = 0;
            snap.forEach((doc) => {
                profilePosts.innerHTML += `<img src="${doc.data().imageUrl}">`;
                count++;
            });
            document.getElementById("postsCount").innerText = count;
        });
    });

    document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth).then(() => window.location.replace("auth.html")));
</script>
</body>
</html>
