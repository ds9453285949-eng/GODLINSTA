<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODLINSTA - Home</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-icon { font-size: 24px; cursor: pointer; }
        #feed { padding-bottom: 70px; }
        .post { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .action-btn { cursor: pointer; font-size: 20px; margin-right: 15px; }
        .toast { position: fixed; bottom: 80px; left: 20px; background: #333; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <header>
        <div onclick="window.location.href='create.html'">➕</div>
        <div>GODLINSTA</div>
        <div onclick="window.location.href='notifications.html'">❤️</div>
    </header>

    <div id="feed"><p style="text-align:center;">Loading Feed...</p></div>

    <nav class="nav-bottom">
        <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
        <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
        <div class="nav-icon" onclick="location.href='reels.html'">🎬</div>
        <div class="nav-icon" onclick="location.href='messages.html'">✈️</div>
        <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
    </nav>

    <script type="module">
        // Auth Guard import kiya gaya hai
        import "./auth-guard.js";
        import { db, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp } from "./firebase-config.js";

        // Notification Helper
        function showNotification(msg) {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Like Button Action
        window.likePost = async (btn, postId) => {
            try {
                btn.innerText = "❤️..."; 
                await addDoc(collection(db, "likes"), {
                    postId: postId,
                    timestamp: serverTimestamp()
                });
                btn.innerText = "❤️";
                showNotification("Liked!");
            } catch (error) {
                console.error(error);
                showNotification("Error liking post");
                btn.innerText = "🤍";
            }
        };

        // Real-time Feed
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const post = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <p style="padding:0 10px;"><b>${post.username}</b></p>
                        <img src="${post.imageUrl}" width="100%">
                        <div style="padding: 10px;">
                            <span class="action-btn" onclick="likePost(this, '${doc.id}')">🤍</span>
                            <span class="action-btn">💬</span>
                            <span class="action-btn">✈️</span>
                        </div>
                        <p style="padding:0 10px;">${post.caption}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
