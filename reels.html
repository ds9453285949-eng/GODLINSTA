<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reels • GODLINSTA</title>
    <style>
        body { margin:0; background:#000; color:#fff; overflow:hidden; font-family:sans-serif; }
        .reel-container { height:100vh; scroll-snap-type:y mandatory; overflow-y:scroll; scrollbar-width:none; }
        .reel-post { height:100vh; scroll-snap-align:start; position:relative; }
        video { width:100%; height:100%; object-fit:cover; }
        .ui-overlay { position:absolute; bottom:100px; right:15px; display:flex; flex-direction:column; gap:20px; align-items:center; }
        .nav-bottom { position:fixed; bottom:0; width:100%; background:#000; display:flex; justify-content:space-around; padding:15px 0; border-top:1px solid #1a1a1a; z-index:1000; }
        /* Bottom Comment Sheet */
        #commentSheet { position:fixed; bottom:-100%; width:100%; height:50%; background:#1a1a1a; transition:0.3s; border-radius:20px 20px 0 0; z-index:2000; padding:20px; box-sizing:border-box; }
    </style>
</head>
<body>

    <div class="reel-container" id="reels"></div>

    <div id="commentSheet">
        <div onclick="closeComments()" style="text-align:right; cursor:pointer;">✕</div>
        <h3>Comments</h3>
        <div id="commentList"></div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-icon" onclick="location.href='home.html'">🏠</div>
        <div class="nav-icon" onclick="location.href='search.html'">🔍</div>
        <div class="nav-icon" onclick="location.href='create.html'">➕</div>
        <div class="nav-icon" onclick="location.href='reels.html'">🎬</div>
        <div class="nav-icon" onclick="location.href='profile.html'">👤</div>
    </nav>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const reelsDiv = document.getElementById("reels");
        const q = query(collection(db, "posts"), where("type", "==", "reel"));
        
        onSnapshot(q, (snap) => {
            reelsDiv.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                reelsDiv.innerHTML += `
                    <div class="reel-post">
                        <video src="${r.imageUrl}" loop playsinline preload="metadata"></video>
                        <div class="ui-overlay">
                            <div onclick="alert('Liked!')">🤍</div>
                            <div onclick="openComments('${doc.id}')">💬</div>
                        </div>
                    </div>
                `;
            });
            // Auto-play Observer
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    e.isIntersecting ? v.play() : v.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.reel-post').forEach(p => observer.observe(p));
        });

        // Comment Sheet Logic
        window.openComments = (id) => document.getElementById("commentSheet").style.bottom = "0";
        window.closeComments = () => document.getElementById("commentSheet").style.bottom = "-100%";
    </script>
</body>
</html>
