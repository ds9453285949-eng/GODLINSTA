<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create • GODLINSTA</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { display: flex; flex-direction: column; gap: 20px; }
        input, button { padding: 15px; border-radius: 8px; border: none; }
        button { background: #0095f6; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Create New Post</h3>
        <input type="file" id="fileInput">
        <input type="text" id="caption" placeholder="Write a caption...">
        <button id="uploadBtn">Share</button>
        <button onclick="location.href='home.html'" style="background:#333;">Cancel</button>
    </div>

    <script type="module">
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const db = getFirestore();
        const auth = getAuth();

        document.getElementById("uploadBtn").addEventListener("click", async () => {
            const caption = document.getElementById("caption").value;
            const user = auth.currentUser;
            
            // Yahan file upload ka logic aayega (abhi placeholder)
            await addDoc(collection(db, "posts"), {
                username: user.email,
                caption: caption,
                imageUrl: "https://via.placeholder.com/400", // Yahan real image URL dalega
                createdAt: new Date()
            });
            alert("Post Uploaded!");
            location.href = "home.html";
        });
    </script>
</body>
</html>
