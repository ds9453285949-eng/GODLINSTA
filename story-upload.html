<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Upload - GODLINSTA</title>

<style>

body{
margin:0;
padding:20px;
background:#000;
color:white;
font-family:Arial,sans-serif;
}

.container{
max-width:400px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.preview{
width:100%;
height:450px;
background:#111;
border-radius:15px;
object-fit:cover;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>Upload Story</h1>

<img id="preview" class="preview">

<input type="file" id="storyImage" accept="image/*">

<button id="uploadBtn">Upload Story</button>

</div>

<script>

let storyData = "";

document.getElementById("storyImage").addEventListener("change", function(){

const file = this.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

storyData = e.target.result;

document.getElementById("preview").src = storyData;

};

reader.readAsDataURL(file);

}

});

document.getElementById("uploadBtn").addEventListener("click", function(){

if(storyData==""){
alert("Please Select Story");
return;
}

let stories =
JSON.parse(localStorage.getItem("stories")) || [];

stories.unshift({
image:storyData,
time:Date.now()
});

localStorage.setItem(
"stories",
JSON.stringify(stories)
);

alert("Story Uploaded Successfully!");

location.href="home.html";

});

</script>

</body>
</html>
