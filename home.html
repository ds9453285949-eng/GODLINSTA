<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA</title>
<style>
    body { margin:0; background:#000; color:#fff; font-family: -apple-system, sans-serif; padding-bottom:70px; }
    
    /* Tiranga Motion Logo */
    .logo-motion {
        font-weight: 900; font-size: 24px; letter-spacing: -1px;
        background: linear-gradient(90deg, #FF9933, #FFFFFF, #138808);
        background-size: 200% 200%;
        -webkit-background-clip: text; background-clip: text;
        color: transparent;
        animation: gradient-motion 3s ease infinite;
    }
    @keyframes gradient-motion {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .topbar { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #262626; position:sticky; top:0; background:#000; z-index:1000; }
    .feed { display: flex; flex-direction: column; align-items: center; }
    .post { width: 100%; max-width: 400px; margin-bottom: 20px; border-bottom: 1px solid #262626; }
    .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #111; }
    .actions { display: flex; justify-content: space-between; padding: 12px; font-size: 26px; }
    .bottom-nav { position:fixed; bottom:0; width:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); display:flex; justify-content:space-around; padding:12px 0; border-top:1px solid #262626; font-size:24px; z-index:1000; }
</style>
</head>
<body>

<div class="topbar">
    <div onclick="location.href='create.html'">➕</div>
    <div class="logo-motion">GODLINSTA</div>
    <div onclick="location.href='notifications.html'">❤️</div>
</div>

<div class="feed" id="feed"></div>

<div class="bottom-nav">
    <div onclick="location.href='home.html'">🏠</div>
    <div onclick="location.href='reels.html'">🎬</div>
    <div onclick="location.href='create.html'">➕</div>
    <div onclick="location.href='search.html'">🔍</div>
    <div onclick="location.href='profile.html'">👤</div>
</div>

<script type="module">
    import { db, collection, query, orderBy, onSnapshot } from "./firebase-config.js";

    const feed = document.getElementById("feed");
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const p = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <div style="padding:10px; font-weight:bold;">${p.username}</div>
                    <img src="${p.image}" class="post-img" style="filter: ${p.filter || 'none'}">
                    <div class="actions">
                        <span>❤️ 💬 ✈️</span>
                        <span onclick="alert('Saved!')">🔖</span>
                    </div>
                    <div style="padding:0 10px 10px;"><b>${p.username}</b> ${p.caption}</div>
                </div>
            `;
        });
    });
</script>
</body>
</html>
