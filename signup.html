<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GODLINSTA Sign Up</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

.container{
max-width:320px;
margin:auto;
padding:20px;
}

input{
width:100%;
padding:15px;
margin:8px 0;
background:#111;
color:white;
border:1px solid #333;
border-radius:10px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:14px;
background:#1877f2;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-top:10px;
}

.create{
background:black;
color:#1877f2;
border:2px solid #1877f2;
}

.tagline{
color:#4f5dff;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<img src="GODL LOGO.png" width="90">

<h1>𝐂𝐑𝐄𝐀𝐓𝐄 𝐀𝐂𝐂𝐎𝐔𝐍𝐓</h1>

<p class="tagline">
Join GODLINSTA Today
</p>

<input type="text" id="fullname" placeholder="Full Name">

<input type="text" id="username" placeholder="Username">
  
<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">
  
<button class="btn" id="signupBtn">
Sign Up
</button>
  
<br><br>

<a href="login.html">
<button class="btn create">
Back To Login
</button>
</a>

</div>

</body>
</html>
